name: Java CI

on:
  push:
    paths:
      - 'java/**'
      - '.github/workflows/java-ci.yml'
    branches:
      - main
      - 'feature/**'
  pull_request:
    paths:
      - 'java/**'
    branches:
      - main

defaults:
  run:
    working-directory: java

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile -DskipTests

      - name: Run unit tests
        run: mvn test

      - name: Run integration tests
        run: mvn verify -DskipUnitTests

      - name: Generate coverage report
        run: mvn jacoco:report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: java/voice-banking-app/target/site/jacoco/
          retention-days: 7

      - name: Check coverage threshold
        run: mvn jacoco:check
        continue-on-error: true  # Don't fail build during initial development

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check
        continue-on-error: true  # Advisory for now

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: java/voice-banking-app/target/dependency-check-report.html
          retention-days: 7
