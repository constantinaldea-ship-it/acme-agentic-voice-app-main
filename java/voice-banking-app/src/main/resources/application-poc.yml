spring:
  config:
    activate:
      on-profile: poc

  datasource:
    url: jdbc:h2:file:./data/poc-events;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.voicebanking.poc: DEBUG
