# ── Branch Finder Adapter (AG-003) ──────────────────────────────
spring.application.name=bfa-adapter-branch-finder
server.port=${PORT:8082}

# ── OpenAPI ──
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Actuator ──
management.endpoints.web.exposure.include=health,info

# ── Logging ──
logging.level.com.voicebanking.bfa.adapter.branchfinder=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId:-}] %logger{36} - %msg%n
