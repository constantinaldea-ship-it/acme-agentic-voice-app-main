# ============================================
# BFA Resource-Oriented REST Service
# ============================================

spring.application.name=bfa-service-resource

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# ============================================
# Actuator / Health
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}

# ============================================
# OpenAPI / Swagger
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ============================================
# BFA Security Configuration
# ============================================
bfa.security.enabled=true
bfa.security.jwt.issuer=https://auth.acmebank.example
bfa.security.jwt.audience=bfa-service
bfa.security.mTLS.required=false
bfa.security.mTLS.allowedClients=voice-banking-app,personal-finance-agent

# ============================================
# Consent Service
# ============================================
bfa.consent.cache.enabled=true
bfa.consent.cache.ttl-seconds=300

# ============================================
# Legitimation Service
# ============================================
bfa.legitimation.enabled=true
bfa.legitimation.cache.enabled=true
bfa.legitimation.cache.ttl-seconds=300
bfa.legitimation.fail-open=false
bfa.legitimation.service.url=http://localhost:8090/api/v1/legitimation

# ============================================
# Audit Configuration
# ============================================
bfa.audit.enabled=true
bfa.audit.include-request-body=false
bfa.audit.include-response-body=false
bfa.audit.async=true

# ============================================
# Logging
# ============================================
logging.level.com.voicebanking.bfa=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n

# ============================================
# Advisory Appointment Upstream
# ============================================
bfa.appointment.upstream.base-url=http://localhost:8080
bfa.appointment.upstream.authorization-header-name=Authorization
bfa.appointment.upstream.correlation-header-name=X-Correlation-ID
bfa.appointment.upstream.client-header-name=X-BFA-Client
bfa.appointment.upstream.client-header-value=advisory-appointment-bff
bfa.appointment.upstream.scenario-header-name=X-Mock-Scenario
bfa.appointment.upstream.fallback-bearer-token=mock-appointment-service-token
bfa.appointment.upstream.cloud-run-auth-enabled=true
bfa.appointment.upstream.cloud-run-authorization-header-name=X-Serverless-Authorization

# ============================================
# Jackson JSON Configuration
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
