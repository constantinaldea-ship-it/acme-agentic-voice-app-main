# =============================================================================
# Application Configuration - TEST Profile
# =============================================================================
# Feature flags for Location Services API during CES agent integration testing
# Matches configuration in ces-agent/agents/location-services-agent.yaml
#
# Profile: test
# Purpose: Isolated branch search testing without auth/consent/audit
# Active: Phase 1 - Core Functionality Validation
# =============================================================================

# -----------------------------------------------------------------------------
# Location Services Feature Flags
# -----------------------------------------------------------------------------
# These flags control which security/compliance features are active.
# During Phase 1 testing, only core branch search functionality is enabled.

# Core features (ENABLED)
acme.features.location-services.branch-search-enabled=true
acme.features.location-services.branch-details-enabled=true

# Security features (DISABLED for testing)
acme.features.location-services.require-authentication=false
acme.features.location-services.require-consent=false
acme.features.location-services.enable-audit-logging=false
acme.features.location-services.enable-consent-annotations=false

# Future features (not yet implemented)
acme.features.location-services.atm-search-enabled=false
acme.features.location-services.appointment-booking-enabled=false
acme.features.location-services.financial-center-search-enabled=false

# API behavior overrides (for debugging)
acme.features.location-services.mock-gps-coordinates=false
acme.features.location-services.bypass-distance-sorting=false

# -----------------------------------------------------------------------------
# Security Configuration (DISABLED for testing)
# -----------------------------------------------------------------------------
# JWT validation is disabled during Phase 1 testing
acme.security.jwt.enabled=false
# acme.security.jwt.issuer=https://auth.acmebank.example
# acme.security.jwt.audience=voice-banking-api
# acme.security.jwt.public-key-url=https://auth.acmebank.example/.well-known/jwks.json

# -----------------------------------------------------------------------------
# Consent Configuration (DISABLED for testing)
# -----------------------------------------------------------------------------
# Consent enforcement is disabled during Phase 1 testing
acme.consent.enforcement.enabled=false
# acme.consent.required-types=AI_INTERACTION,DATA_PROCESSING

# -----------------------------------------------------------------------------
# Audit Logging Configuration (DISABLED for testing)
# -----------------------------------------------------------------------------
# Audit logging is disabled during Phase 1 testing
acme.audit.enabled=false
# acme.audit.database.table=voice_banking_audit
# acme.audit.log-level=INFO

# -----------------------------------------------------------------------------
# OpenAPI Configuration
# -----------------------------------------------------------------------------
# OpenAPI spec generation settings
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs/location-services
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui/location-services.html

# Security schemes in OpenAPI spec (defined but not enforced)
springdoc.swagger-ui.oauth.client-id=voice-banking-test-client
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha

# -----------------------------------------------------------------------------
# Server Configuration
# -----------------------------------------------------------------------------
server.port=8082
server.servlet.context-path=/

# -----------------------------------------------------------------------------
# CORS Configuration (for local testing)
# -----------------------------------------------------------------------------
acme.cors.allowed-origins=http://localhost:3000,http://localhost:8080
acme.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
acme.cors.allowed-headers=*
acme.cors.exposed-headers=X-Correlation-Id,X-Request-Id
acme.cors.allow-credentials=true
acme.cors.max-age=3600

# -----------------------------------------------------------------------------
# Database Configuration (H2 in-memory for testing)
# -----------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------------------------------------------------------------------
# Logging Configuration
# -----------------------------------------------------------------------------
logging.level.com.acmebank.bfa=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log all HTTP requests/responses
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE

# -----------------------------------------------------------------------------
# Branch Data Configuration
# -----------------------------------------------------------------------------
# Location of branch data JSON file
acme.branches.data-file=classpath:data/branches.json
acme.branches.reload-on-startup=true

# -----------------------------------------------------------------------------
# How to Progress to Phase 2 (Authentication Enabled)
# -----------------------------------------------------------------------------
# 1. Change: acme.features.location-services.require-authentication=true
# 2. Change: acme.security.jwt.enabled=true
# 3. Uncomment JWT configuration properties (issuer, audience, public-key-url)
# 4. Update CES agent: set skip_authentication: false
# 5. Test with valid JWT tokens from Acme Bank auth service
#
# Expected behavior:
# - Requests without Authorization header → 401 Unauthorized
# - Requests with invalid token → 401 Unauthorized
# - Requests with valid token → 200 OK (if all other checks pass)

# -----------------------------------------------------------------------------
# How to Progress to Phase 3 (Consent Enforcement)
# -----------------------------------------------------------------------------
# 1. Complete Phase 2 first
# 2. Change: acme.features.location-services.require-consent=true
# 3. Change: acme.consent.enforcement.enabled=true
# 4. Uncomment @RequiresConsent annotations in LocationController.java
# 5. Update CES agent: set skip_consent_check: false
# 6. Ensure consent records exist in database
#
# Expected behavior:
# - User with AI_INTERACTION consent → 200 OK
# - User without AI_INTERACTION consent → 403 Forbidden

# -----------------------------------------------------------------------------
# How to Progress to Phase 4 (Audit Logging)
# -----------------------------------------------------------------------------
# 1. Complete Phase 3 first
# 2. Change: acme.features.location-services.enable-audit-logging=true
# 3. Change: acme.audit.enabled=true
# 4. Uncomment @AuditLogged annotations in LocationController.java
# 5. Verify voice_banking_audit table exists
# 6. Test audit log writes
#
# Expected behavior:
# - All branch searches logged to voice_banking_audit table
# - Correlation ID tracked for request tracing
# - User ID, action type, timestamp recorded
