# ── BFA Gateway Demo ────────────────────────────────────────────
spring.application.name=bfa-gateway
server.port=${PORT:8081}

# ── Remote Adapter Registry (ADR-0104 Option C) ──
# Adapter base URLs
bfa.gateway.adapters.branch-finder.url=${ADAPTER_BRANCH_FINDER_URL:http://localhost:8082}
bfa.gateway.adapters.branch-finder.description=AG-003 — Branch Finder (location search)

# Tool → Adapter + Action routing (N tools can fan into 1 adapter)
bfa.gateway.tools.branchFinder.adapter=branch-finder
bfa.gateway.tools.branchFinder.action=search

# ── OpenAPI / Swagger ──
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Gateway security (Edge PEP) ──
bfa.gateway.security.enabled=true

# ── Response PEP — field masking ──
bfa.gateway.response-pep.enabled=true
bfa.gateway.response-pep.masked-fields=accountNumber,iban,cardNumber

# ── AuthZ PDP stub ──
bfa.gateway.authz.mode=stub
bfa.gateway.authz.default-decision=PERMIT

# ── Actuator ──
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ──
logging.level.com.voicebanking.bfa.gateway=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId:-}] %logger{36} - %msg%n
