# ============================================
# BFA MCP Spike (ADR-CES-003)
# Standalone MCP server for location services
# ============================================

spring.application.name=bfa-mcp-spike

# Server — runs on 8081 to avoid conflicts with bfa-service-resource (8080)
server.port=${PORT:8081}

# ============================================
# MCP Server Configuration
# CES requires Streamable HTTP (SSE is not supported since 2026-02-12)
# ============================================
spring.ai.mcp.server.name=acme-location-services
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.instructions=Search for Acme Bank branch locations across Germany. \
  Tools: branch_search (search by city/address/GPS/brand) and branch_details (get full branch info by ID). \
  Data covers 238 Deutsche Bank and Postbank branches across 50 German cities.

# ============================================
# Logging
# ============================================
logging.level.com.voicebanking.mcp=DEBUG
logging.level.org.springframework.ai.mcp=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# Jackson JSON
# ============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
